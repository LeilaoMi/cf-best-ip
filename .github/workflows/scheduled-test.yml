name: Scheduled Test

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node -c src/worker.js
      - run: node --test
      - run: node scripts/verify-worker.mjs
