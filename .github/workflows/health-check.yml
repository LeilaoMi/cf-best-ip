name: Health Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check cf-best-ip health
        run: |
          set -euo pipefail
          body="$(curl -fsS --max-time 20 https://bestip.leilaomi.cc.cd/health)"
          echo "$body"
          echo "$body" | jq -e '.ok == true'
      - name: Source health gate
        if: always()
        run: |
          body="$(curl -fsS --max-time 20 https://bestip.leilaomi.cc.cd/health)"
          ok=$(echo "$body" | jq -r '.sourceHealth.ok // 0')
          total=$(echo "$body" | jq -r '.sourceHealth.total // 0')
          failed=$(echo "$body" | jq -r '.sourceHealth.failed // 0')
          echo "Sources: $ok/$total ok, $failed failed"
          # Fail if more than 60% of sources failed
          if [ "$total" -gt 0 ]; then
            threshold=$(( total * 60 / 100 ))
            [ "$failed" -le "$threshold" ] || { echo "::error::Too many sources failed: $failed/$total"; exit 1; }
          fi
